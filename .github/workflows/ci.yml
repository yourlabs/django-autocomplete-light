name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  checkqa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install tox
      - run: tox -e checkqa

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install tox
      - run: tox -e docs

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            django-version: "3.2"
            tox-env: py311-dj32
          - python-version: "3.11"
            django-version: "4.2"
            tox-env: py311-dj42
          - python-version: "3.12"
            django-version: "5.2"
            tox-env: py312-dj52
          - python-version: "3.12"
            django-version: "6.0"
            tox-env: py312-dj60
    name: Python ${{ matrix.python-version }} / Django ${{ matrix.django-version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install Firefox
        uses: browser-actions/setup-firefox@v1
      - run: pip install tox
      - run: tox -e ${{ matrix.tox-env }}
        env:
          MOZ_HEADLESS: "1"
          BROWSER: firefox
