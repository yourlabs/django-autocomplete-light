<!doctype html>
<html>
<head>
  <link href="/static/dal_alight/autocomplete-light.css" media="all" rel="stylesheet">
  <script src="/static/dal_alight/autocomplete-light.js"></script>
  <script src="/static/dal_alight/dal-django.js"></script>
  <style>body{font-family:sans-serif;max-width:600px;margin:2em auto;}</style>
</head>
<body>
<h2>Component isolation test</h2>
<p>Click the input below — should show choices from the server. Clicking a choice should add it as a chip.</p>

<autocomplete-select id="test-widget">
  <select slot="select" name="test_fk" id="id_test_fk"></select>
  <div slot="deck"></div>
  <autocomplete-select-input slot="input" url="/fk/test-autocomplete/">
    <input slot="input" type="text" placeholder="Type to search…" />
  </autocomplete-select-input>
</autocomplete-select>

<hr>
<h3>Multiple select test</h3>
<autocomplete-select id="test-widget-multi" multiple>
  <select slot="select" name="test_m2m" id="id_test_m2m" multiple></select>
  <div slot="deck"></div>
  <autocomplete-select-input slot="input" url="/m2m/test-autocomplete/">
    <input slot="input" type="text" placeholder="Type to search…" />
  </autocomplete-select-input>
</autocomplete-select>

<hr>
<pre id="log" style="background:#f5f5f5;padding:1em;font-size:12px;">Events will appear here…</pre>

<script>
  var log = document.getElementById('log');
  function logMsg(msg) {
    log.textContent = new Date().toISOString().slice(11,23) + ' ' + msg + '\n' + log.textContent;
  }

  document.addEventListener('autocompleteChoiceSelected', function(ev) {
    logMsg('autocompleteChoiceSelected: value=' + ev.detail.choice.getAttribute('data-value'));
  });

  document.addEventListener('mousedown', function(ev) {
    if (ev.target.getAttribute('data-value')) {
      logMsg('mousedown on choice: ' + ev.target.getAttribute('data-value') + ' text=' + ev.target.textContent.trim());
    }
  });

  ['test-widget', 'test-widget-multi'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el && el.querySelector('select')) {
      el.querySelector('select').addEventListener('change', function() {
        logMsg('select change: value=' + this.value);
      });
    }
  });
</script>
</body>
</html>
