<!doctype html>
<html>
<head>
  <title>{{ title }} — dal_alight demo</title>
  {{ form.media }}
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 2em auto; padding: 0 1em; }
    .back { margin-bottom: 1em; }
    label { display: block; margin-top: 1em; font-weight: bold; }
    input[type=text], select { width: 100%; box-sizing: border-box; padding: .4em; }
    input[type=submit] { margin-top: 1.5em; padding: .5em 2em; }
    autocomplete-select { display: block; }
  </style>
</head>
<body>
  <div class="back"><a href="/">← back to index</a></div>
  <h2>{{ title }}</h2>

  {% if object %}
    <p>Editing: <strong>{{ object }}</strong></p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" value="Save">
  </form>
</body>
</html>
